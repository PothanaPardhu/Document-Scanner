<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus-Flow AI</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <!-- Load MediaPipe in popup -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header style="display:flex; justify-content: space-between; align-items: center;">
      <div>
        <h1>Focus-Flow</h1>
        <div id="focus-score-display" style="font-size: 11px; color: #10b981; font-weight: bold; margin-top: -5px;">Focus Score: 82%</div>
      </div>
      <div style="display: flex; align-items: center; gap: 5px;">
        <label class="switch">
          <input type="checkbox" id="demo-mode-toggle">
          <span class="slider round"></span>
        </label>
        <span class="demo-label">Demo</span>
      </div>
    </header>

    <div class="main-content">
      <div class="setting-group">
        <label for="difficulty">Reading Difficulty:</label>
        <select id="difficulty">
          <option value="Easy">Easy</option>
          <option value="Medium" selected>Medium</option>
          <option value="Technical">Technical</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="target-lang">Translate To:</label>
        <select id="target-lang">
          <option value="te" selected>Telugu</option>
          <option value="hi">Hindi</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>

      <button id="btn-login" class="btn primary">Login with Google</button>
      
      <div class="action-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
        <button id="btn-gesture" class="btn secondary">Gesture Hub</button>
        <button id="btn-panic" class="btn secondary" style="background:#fee2e2; border-color:#fecaca; color:#dc2626;">Panic Mode</button>
      </div>

      <div style="margin-top: 16px; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span><strong>Privacy First:</strong> Your reading data is processed via encrypted tunnel and never stored permanently.</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
