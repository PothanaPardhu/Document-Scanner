<!DOCTYPE html>
<html>
<head>
  <title>Focus-Flow Gesture Hub</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
    h1 { margin-bottom: 10px; color: #818cf8; }
    p { color: #94a3b8; margin-bottom: 20px; }
    #video-feed { width: 400px; height: 300px; border-radius: 12px; background: #000; transform: scaleX(-1); border: 4px solid #334155; }
    .status { margin-top: 20px; font-weight: bold; padding: 8px 16px; border-radius: 20px; background: #334155; }
    .status.active { background: #10b981; color: white; }
  </style>
  <!-- Load MediaPipe scripts - Using a tab avoids the tight Popup CSP -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="card">
    <h1>Gesture Hub</h1>
    <p>Keep this tab open for Wave-to-Clean functionality.</p>
    <video id="video-feed" autoplay playsinline></video>
    <div id="gesture-status" class="status">Initializing Camera...</div>
  </div>
  <script src="gesture.js"></script>
</body>
</html>
